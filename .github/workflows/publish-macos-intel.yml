name: Publish macOS Intel

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-osx-x64:
    name: Build and Release (osx-x64)
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/UI/UI.csproj

      - name: Publish osx-x64
        run: |
          dotnet publish src/UI/UI.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:UseAppHost=true \
            -o out/osx-x64

      - name: Build metadata
        id: meta
        shell: bash
        run: |
          TS="$(date -u +%Y%m%d)"
          TAG="${TS}-r${GITHUB_RUN_NUMBER}"
          ZIP="APISwitch-osx-intel-${TAG}.zip"
          echo "timestamp=${TS}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        shell: bash
        run: |
          APP_DIR="out/APISwitch.app"
          CONTENTS_DIR="${APP_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"
          RESOURCES_DIR="${CONTENTS_DIR}/Resources"
          EXECUTABLE_NAME="APISwitch"

          rm -rf "${APP_DIR}"
          mkdir -p "${MACOS_DIR}" "${RESOURCES_DIR}"
          cp -R out/osx-x64/* "${MACOS_DIR}/"

          mkdir -p out/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z "${size}" "${size}" src/UI/Assets/app-preview.png --out "out/icon.iconset/icon_${size}x${size}.png"
            sips -z "$((size * 2))" "$((size * 2))" src/UI/Assets/app-preview.png --out "out/icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns out/icon.iconset -o "${RESOURCES_DIR}/app.icns"
          rm -rf out/icon.iconset

          cat > "${CONTENTS_DIR}/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>APISwitch</string>
            <key>CFBundleDisplayName</key>
            <string>APISwitch</string>
            <key>CFBundleIdentifier</key>
            <string>com.leen.apiswitch</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleExecutable</key>
            <string>APISwitch</string>
            <key>CFBundleIconFile</key>
            <string>app.icns</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          chmod +x "${MACOS_DIR}/${EXECUTABLE_NAME}"

      - name: Package .app zip
        run: |
          cd out
          zip -r "${{ steps.meta.outputs.zip }}" APISwitch.app

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: APISwitch-osx-intel-${{ steps.meta.outputs.tag }}
          path: out/${{ steps.meta.outputs.zip }}
          retention-days: 30

      - name: Create GitHub Release (new version per commit)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            "out/${{ steps.meta.outputs.zip }}" \
            --title "APISwitch OSX Intel ${{ steps.meta.outputs.tag }}" \
            --notes "Commit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.run_id }}"
