name: Publish Cross Platform

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-osx-x64:
    name: Build (osx-x64)
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/UI/UI.csproj

      - name: Publish osx-x64
        run: |
          dotnet publish src/UI/UI.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:UseAppHost=true \
            -o out/osx-x64

      - name: Build .app bundle
        shell: bash
        run: |
          APP_DIR="out/APISwitch.app"
          CONTENTS_DIR="${APP_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"
          RESOURCES_DIR="${CONTENTS_DIR}/Resources"
          EXECUTABLE_NAME="APISwitch"

          rm -rf "${APP_DIR}"
          mkdir -p "${MACOS_DIR}" "${RESOURCES_DIR}"
          cp -R out/osx-x64/* "${MACOS_DIR}/"

          mkdir -p out/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z "${size}" "${size}" src/UI/Assets/app-preview.png --out "out/icon.iconset/icon_${size}x${size}.png"
            sips -z "$((size * 2))" "$((size * 2))" src/UI/Assets/app-preview.png --out "out/icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns out/icon.iconset -o "${RESOURCES_DIR}/app.icns"
          rm -rf out/icon.iconset

          cat > "${CONTENTS_DIR}/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>APISwitch</string>
            <key>CFBundleDisplayName</key>
            <string>APISwitch</string>
            <key>CFBundleIdentifier</key>
            <string>com.leen.apiswitch</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleExecutable</key>
            <string>APISwitch</string>
            <key>CFBundleIconFile</key>
            <string>app.icns</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          chmod +x "${MACOS_DIR}/${EXECUTABLE_NAME}"

      - name: Package .app zip
        run: |
          cd out
          zip -r APISwitch-osx-intel.zip APISwitch.app

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: APISwitch-osx-intel
          path: out/APISwitch-osx-intel.zip
          retention-days: 30

  publish-win-x64:
    name: Build (win-x64, single-file, non-self-contained)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/UI/UI.csproj

      - name: Publish win-x64
        run: |
          dotnet publish src/UI/UI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o out/win-x64

      - name: Package win-x64 zip
        shell: pwsh
        run: |
          Compress-Archive -Path "out/win-x64/*" -DestinationPath "out/APISwitch-win-x64.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: APISwitch-win-x64
          path: out/APISwitch-win-x64.zip
          retention-days: 30

  release:
    name: Create GitHub Release (new version per commit)
    runs-on: ubuntu-latest
    needs:
      - publish-osx-x64
      - publish-win-x64

    steps:
      - name: Download osx artifact
        uses: actions/download-artifact@v4
        with:
          name: APISwitch-osx-intel
          path: out/osx

      - name: Download win artifact
        uses: actions/download-artifact@v4
        with:
          name: APISwitch-win-x64
          path: out/win

      - name: Build release metadata
        id: meta
        shell: bash
        run: |
          TS="$(date -u +%Y%m%d)"
          TAG="${TS}-r${GITHUB_RUN_NUMBER}"
          OSX_ZIP="APISwitch-osx-intel-${TAG}.zip"
          WIN_ZIP="APISwitch-win-x64-${TAG}.zip"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "osx_zip=${OSX_ZIP}" >> "$GITHUB_OUTPUT"
          echo "win_zip=${WIN_ZIP}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with both assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          NOTES="$(printf 'Commit: %s\nBranch: %s\nRun: %s\n' \
            '${{ github.sha }}' \
            '${{ github.ref_name }}' \
            '${{ github.run_id }}')"

          OSX_ZIP_PATH="out/osx/APISwitch-osx-intel.zip"
          WIN_ZIP_PATH="out/win/APISwitch-win-x64.zip"

          if [ ! -f "$OSX_ZIP_PATH" ] || [ ! -f "$WIN_ZIP_PATH" ]; then
            echo "Release assets are missing."
            exit 1
          fi

          mv "$OSX_ZIP_PATH" "out/osx/${{ steps.meta.outputs.osx_zip }}"
          mv "$WIN_ZIP_PATH" "out/win/${{ steps.meta.outputs.win_zip }}"

          gh release create "${{ steps.meta.outputs.tag }}" \
            "out/osx/${{ steps.meta.outputs.osx_zip }}" \
            "out/win/${{ steps.meta.outputs.win_zip }}" \
            --repo "${{ github.repository }}" \
            --title "APISwitch ${{ steps.meta.outputs.tag }}" \
            --notes "$NOTES"
